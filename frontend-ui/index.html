<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Oscar Winners</title>
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="navbar">
        <div class="logo">
            <!--uncomment the following lines if you want to add a logo image next to the text-->
            <!-- <img src="oscar.png" class="logo-icon"> -->
            <span>Oscar Winners 1927-2024</span>
        </div>

            <div class="nav-controls">
                <select id="yearFilter">
                    <option value="All">All Years</option>
                </select>
                <div class="search-wrapper">
                    <input type="text" id="searchInput" placeholder="Search movies...">
                    <span class="search-icon">&#128269;</span>
              
                </div>
                <a href="https://github.com/ayemmk21/Web_crawler/tree/main" target="_blank" class="github-btn">
                Github
                </a>
            </div>
        </div>
    </div>

<!-- 
    <section id="banner">
        <div class="banner-content">
            <h1 id="bannerTitle"></h1>
            <p id="bannerMeta"></p>
            <p id="bannerCast"></p>

            <button id="bannerBtn">More</button>
        </div>
    </section> -->

    <main class="main-content">
        <div class="grid-top">
            <select id="sortSelect">
                <option value="default">Sort: Default</option>
                <option value="wins_desc">Most Wins</option>
                <option value="nominations_desc">Most Nominations</option>
                <option value="budget_desc">Highest Budget</option>
                <option value="boxoffice_desc">Highest Box Office</option>
            </select>
        </div>
        <div id="movieGrid" class="grid"></div>
        <div id="noResults" class="no-results">Item not found</div>
        <div id="pagination"></div>
    </main>
    

    <footer class="footer">
        © Oscar Winners 1927–2024 | Team "Name"
    </footer>

    <script src="/script.js"></script>
</body>
</html>
